<!doctype html>
<html>
<head>
<title>Hash Miner</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<base target="_blank">
<style>
  body, textarea, input, select {
    font-family: monospace;
    font-size: 13px;
  }
  fieldset {
    margin: 0;
    border: #ddd solid 1px;
  }
  fieldset > div {
    margin-top: 0.5em;
  }
  .row {
    margin: 1em 0;
  }
  #txtChallenge {
    width: 300px;
  }
  input:invalid {
    color: red;
  }
  #txtDifficulty, select {
    width: 120px;
  }
  #txtDigest em {
    font-style: normal;
    color: red;
  }
  .icon {
    display: inline-block;
    width: 1.2em;
  }
  .label {
    display: inline-block;
    width: 7em;
  }
  #btnUpdate {
    width: 1.5em;
    padding: 0;
  }
  #sliderCpuNum, #sliderGpuNum {
    width: 310px;
  }
  table {
    border-collapse: collapse;
  }
  table, td, th {
    border: 1px #f0f0f0 solid;
    margin: 1em 0;
  }
  tr:nth-child(odd) td{
    background:#f0f0f0;
  }
  td, th {
    padding: 0.3em 0.6em;
    text-align: right;
  }
  th {
    text-align: center;
  }
  td:first-child {
    text-align: center;
  }
  td:last-child {
    width: 150px;
  }

  #txtLog {
    width: 100%;
    height: 300px;
    border: none;
    outline: none;
  }
</style>
</head>
<body>
<h2>Hash Miner</h2>
<span>🏆 SHA256(Challenge || Nonce) = 0000... <i>(bit0 × Difficulty)</i></span>
<fieldset id="fieldsetInput" class="row" disabled>
  <legend>Input</legend>
  <div>
    <span class="icon">🧩</span>
    <span class="label">Challenge:</span>
    <input type="text" id="txtChallenge" maxlength="32" pattern="^[0-9A-Fa-f]{32}$">
    <button id="btnUpdate">🎲</button>
  </div>
  <div>
    <span class="icon">💪</span>
    <span class="label">Difficulty:</span>
    <input type="number" id="txtDifficulty" value="35" min="1" max="64">
  </div>
</fieldset>
<div class="row">
  <button id="btnStart">▶️ Start</button>
  <button id="btnStop" disabled>⏹️ Stop</button>
</div>
<fieldset class="row">
  <legend>Output</legend>
  <div>
    <span class="icon">🎯</span>
    <span class="label">Nonce:</span>
    <span id="txtNonce"></span>
  </div>
  <div>
    <span class="icon">🫆</span>
    <span class="label">Digest:</span>
    <span id="txtDigest"></span>
  </div>
</fieldset>
<fieldset class="row">
  <legend>Config</legend>
  <div>
    <span class="icon">⚙️</span>
    GPU Load:
    <input type="range" id="sliderGpuNum" min="1" max="100" value="100">
    <span id="txtGpuNum"></span>%
  </div>
  <div>
    <span class="icon">⚙️</span>
    CPU Load:
    <input type="range" id="sliderCpuNum" min="1" max="100" value="70">
    <span id="txtCpuNum"></span>%
  </div>
  <table class="row">
    <thead>
      <th>Device</th>
      <th>Current Speed</th>
      <th>Hash Searched</th>
    </thead>
    <tbody id="tableStatus"></tbody>
  </table>
  <div>
    <span class="icon">🕒</span>
    <span id="txtTime">-</span>
  </div>  
  <div id="batteryBar" hidden>
    <span class="icon" id="txtBatteryIcon">🔋</span>
    <span id="txtBatteryLevel"></span>%
  </div>
</fieldset>
<fieldset class="row">
  <legend>Debug</legend>
  <div>
    <span class="icon">🛠️</span>
    GPU API:
    <select id="optGpuApi">
      <option disabled>WebGPU</option>
      <option disabled>WebGL2</option>
      <option selected>None</option>
    </select>
  </div>
  <div>
    <span class="icon">🛠️</span>
    CPU API:
    <select id="optCpuApi">
      <option disabled>Wasm-SIMD</option>
      <option disabled>Wasm</option>
      <option selected>asm.js</option>
    </select>
  </div>
</fieldset>
<fieldset class="row">
  <legend>Log</legend>
  <div>
    <textarea id="txtLog"></textarea>
  </div>
</fieldset>
<script type="module">
  if (!Uint8Array.prototype.toHex) {
    await import('https://cdnjs.cloudflare.com/ajax/libs/core-js/3.45.1/minified.js')
  }
  import * as miner from './index.js'

  function log(str) {
    txtLog.value += str + '\n'
  }

  function lockInputUi() {
    fieldsetInput.disabled = true
    btnStart.disabled = true
    btnStop.disabled = false
  }

  function unlockInputUi() {
    fieldsetInput.disabled = false
    btnStart.disabled = false
    btnStop.disabled = true
    clearInterval(timer)
  }

  let startTime
  let timer = 0

  const unit = ['', 'k', 'M', 'G']

  function formatUnit(v) {
    let i = 0;
    while (v >= 1000 && i < unit.length - 1) {
      v /= 1000
      i++
    }
    return v.toFixed(1) + ' ' + unit[i]
  }

  function formatHashSpeed(v) {
    return formatUnit(v) + 'H/s'
  }

  function formatTime(ms) {
    const time = new Date(ms).toISOString().slice(11, 19)
    const day = ms / 86400000 | 0
    if (day) {
      return `${day}day ${time}`
    }
    return time
  }

  const tableRows = []

  const COLUMN_DEV_NAME = 0
  const COLUMN_CUR_SPD = 1
  const COLUMN_HASH_NUM = 2

  const ROW_DEV_ALL = 0
  const ROW_DEV_GPU = 1
  const ROW_DEV_CPU = 2

  function addTableRow(name) {
    const row = document.createElement('tr')
    row.innerHTML = `<td>${name}</td>` + '<td></td>'.repeat(2)
    tableStatus.appendChild(row)

    tableRows.push([
      ...row.childNodes
    ])
  }

  function setTable(row, col, str) {
    tableRows[row][col].textContent = str
  }

  let progressLast
  const progressDeltaRecent = []
  const MAX_SECONDS = 3

  function updateProgress() {
    const progressCurr = miner.progress

    if (!progressLast) {
      progressLast = progressCurr.concat()
      return
    }
    let totalSpeed = 0
    let cpuSpeed = 0

    let totalHashNum = 0
    let cpuHashNum = 0

    progressCurr.forEach((v, i) => {
      totalHashNum += v
      const delta = v - progressLast[i]

      const item = progressDeltaRecent[i]
      if (item.push(delta) > MAX_SECONDS) {
        item.shift()
      }
      const sum = item.reduce((v, s) => v + s)
      const avg = Math.round(sum / item.length)
      totalSpeed += avg

      if (i === 0) {
        setTable(ROW_DEV_GPU, COLUMN_CUR_SPD, formatHashSpeed(avg))
        setTable(ROW_DEV_GPU, COLUMN_HASH_NUM, v.toLocaleString())
      } else {
        setTable(ROW_DEV_CPU + i, COLUMN_CUR_SPD, formatHashSpeed(avg))
        setTable(ROW_DEV_CPU + i, COLUMN_HASH_NUM, v.toLocaleString())
        cpuSpeed += avg
        cpuHashNum += v
      }
    })

    // speed
    setTable(ROW_DEV_ALL, COLUMN_CUR_SPD, formatHashSpeed(totalSpeed))
    setTable(ROW_DEV_CPU, COLUMN_CUR_SPD, formatHashSpeed(cpuSpeed))

    // hash num
    setTable(ROW_DEV_ALL, COLUMN_HASH_NUM, totalHashNum.toLocaleString())
    setTable(ROW_DEV_CPU, COLUMN_HASH_NUM, cpuHashNum.toLocaleString())

    progressLast = progressCurr.concat()
    txtTime.textContent = formatTime(Date.now() - startTime)
  }

  miner.events.onComplete = async (nonce) => {
    const difficulty = +txtDifficulty.value
    const challengeHex = txtChallenge.value
    const nonceHex = nonce.toHex()

    const message = Uint8Array.fromHex(challengeHex + nonceHex)
    const hashBuf = await crypto.subtle.digest('SHA-256', message)
    const hashU8  = new Uint8Array(hashBuf)
    const hashU32 = new Uint32Array(hashBuf)
    const hashHex = hashU8.toHex()

    const prefixHexNum = Math.ceil(difficulty / 4)
    const prefixHex = hashHex.substring(0, prefixHexNum)
    const suffixHex = hashHex.substring(prefixHexNum)

    txtNonce.textContent = nonceHex
    txtDigest.innerHTML = '<em>' + prefixHex + '</em>' + suffixHex

    let prefixHexStr = ''
    let prefixBinStr = ''
    let prefixNthStr = ''
    let i = 1

    for (const v of prefixHex) {
      prefixNthStr += ' ' + (i++).toString().padStart(4, ' ')
      prefixHexStr += '    ' + v
      prefixBinStr += ' ' + parseInt(v, 16).toString(2).padStart(4, '0')
    }

    const date = new Date().toLocaleTimeString()

    log(`\
Completed (${date})

Digest:
${prefixHex} ${suffixHex}

Prefix:
(hex)${prefixHexStr}
(bin)${prefixBinStr}
(nth)${prefixNthStr}

Verify:

\`\`\`javascript
var challenge = '${challengeHex}'
var nonce = '${nonceHex}'

var message = Uint8Array.fromHex(challenge + nonce)
var hashBuf = await crypto.subtle.digest('SHA-256', message)
var hashHex = new Uint8Array(hashBuf).toHex()

console.log(hashHex.startsWith('${prefixHex}'))
\`\`\`
`)
    unlockInputUi()
  }

  miner.events.onError = (err) => {
    log('ERROR: ' + err.message)
    btnStop.onclick()
  }

  btnUpdate.onclick = () => {
    const bin = crypto.getRandomValues(new Uint8Array(16))
    txtChallenge.value = bin.toHex()
  }

  btnStart.onclick = () => {
    miner.progress.forEach((v, i) => {
      progressDeltaRecent[i] = []
    })
    progressLast = null
    txtNonce.textContent = ''
    txtDigest.textContent = ''
    txtTime.textContent = ''

    if (txtChallenge.validity.patternMismatch ||
      txtDifficulty.validity.rangeOverflow
    ) {
      log('invalid input')
      return
    }

    const date = new Date().toLocaleTimeString()
    log(`Mining... (${date})`)
    lockInputUi()

    const challenge = Uint8Array.fromHex(txtChallenge.value)
    const difficulty = +txtDifficulty.value

    startTime = Date.now()
    miner.start(challenge, difficulty)
    timer = setInterval(updateProgress, 1000)
  }

  btnStop.onclick = () => {
    miner.stop()
    unlockInputUi()
    log('Stopped')
  }

  sliderGpuNum.oninput = function() {
    txtGpuNum.textContent = this.value
    miner.setGpuLoadRate(this.value / 100)
  }

  sliderCpuNum.oninput = function() {
    txtCpuNum.textContent = this.value
    miner.setCpuLoadRate(this.value / 100)
  }

  optGpuApi.oninput = function() {
    miner.setGpuApi(optGpuApi.selectedIndex)
  }

  optCpuApi.oninput = function() {
    miner.setCpuApi(optCpuApi.selectedIndex)
  }

  async function showBattery() {
    const battery = await navigator.getBattery()
    const update = () => {
      if (battery.charging) {
        batteryBar.hidden = true
      } else {
        batteryBar.hidden = false
        txtBatteryLevel.textContent = battery.level * 100 | 0
      }
    }
    battery.onchargingchange = update
    battery.onlevelchange = update
    update()
  }

  async function main() {
    txtLog.value = ''
    addTableRow('*')
    addTableRow('GPU')
    addTableRow('CPU')

    for (let i = 1; i <= navigator.hardwareConcurrency; i++) {
      addTableRow('#' + i)
    }
    fieldsetInput.disabled = false
    btnUpdate.click()

    if (navigator.getBattery) {
      showBattery()
    }
    await miner.init()

    // GPU (WebGPU or WebGL2)
    if (miner.features.gpu[miner.GpuApi.WEBGL2]) {
      optGpuApi.options[1].disabled = false
      optGpuApi.options[1].selected = true
    }
    if (miner.features.gpu[miner.GpuApi.WEBGPU]) {
      optGpuApi.options[0].disabled = false
      optGpuApi.options[0].selected = true
    }
    optGpuApi.oninput()

    // CPU (wasm or asm.js)
    if (miner.features.cpu[miner.CpuApi.WASM]) {
      optCpuApi.options[1].disabled = false
      optCpuApi.options[1].selected = true
    }
    if (miner.features.cpu[miner.CpuApi.WASM_SIMD]) {
      optCpuApi.options[0].disabled = false
      optCpuApi.options[0].selected = true
    }
    optCpuApi.oninput()

    sliderGpuNum.oninput()
    sliderCpuNum.oninput()
  }
  main()
</script>

</body>
</html>
